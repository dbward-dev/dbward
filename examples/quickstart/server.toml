state_dir = "/data"

[auth]
default_role = "requester"

[[databases]]
name = "app"
environments = ["development", "staging"]

# Development: auto-approve all requests
[[workflows]]
database = "*"
environment = "development"

[workflows.auto_approve]
mode = "always"

# Staging: 1 admin must approve before execution
[[workflows]]
database = "*"
environment = "staging"

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
role = "admin"
min = 1

[result_storage]
backend = "local"
root_dir = "/data/results"
