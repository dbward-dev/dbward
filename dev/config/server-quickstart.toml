state_dir = "/data"
trusted_proxies = ["172.16.0.0/12", "127.0.0.1"]

[auth]
mode = "token"

# Single database for quickstart
[[databases]]
name = "app"
environments = ["development", "staging"]

# Development: auto-approve (instant execution)
[[workflows]]
database = "*"
environment = "development"
steps = []

# Staging: 1-step approval (admin can approve)
[[workflows]]
database = "*"
environment = "staging"

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
role = "admin"
min = 1

# Auto-approve: development auto-approves everything, staging requires human approval
[[auto_approve]]
database = "*"
environment = "development"
risk = "high"

[[auto_approve]]
database = "*"
environment = "staging"
risk = "none"

[result_storage]
backend = "local"
root_dir = "/data/results"

[sql_review]
no_where_delete = "block"
no_where_update = "block"
