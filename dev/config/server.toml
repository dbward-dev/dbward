state_dir = "/data"

# Trust Docker internal network for XFF resolution
trusted_proxies = ["172.16.0.0/12", "127.0.0.1"]

# Development: allow webhooks to private/internal hosts
allow_private_networks = true

[auth]
mode = "token"

[[auth.roles]]
name = "slack-user"
permissions = ["request.execute", "request.query", "request.resume", "request.cancel", "request.approve", "result.view"]
databases = ["*"]
environments = ["*"]

[[auth.role_bindings]]
role = "slack-user"
subjects = ["alice", "bob"]

[[auth.groups]]
name = "backend-team"
members = ["bob"]

[[auth.groups]]
name = "dba-team"
members = ["bob"]

# Database registry
[[databases]]
name = "app"
environments = ["development", "staging", "production"]

[[databases]]
name = "default"
environments = ["development", "staging", "production"]

[[databases]]
name = "billing"
environments = ["development", "production"]

# Workflow definitions (synced to SQLite on startup)

# Development: auto-approve everything
[[workflows]]
database = "*"
environment = "development"

[workflows.auto_approve]
mode = "always"

# Staging: risk-based auto-approve + team-lead OR dba (either one)
[[workflows]]
database = "*"
environment = "staging"

[workflows.auto_approve]
mode = "risk_based"
risk = "low"

[[workflows.steps]]
type = "approval"
mode = "any"

[[workflows.steps.approvers]]
role = "team-lead"
min = 1

[[workflows.steps.approvers]]
role = "dba"
min = 1

# Production: 1-step approval
[[workflows]]
database = "*"
environment = "production"
require_reason = true

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
role = "slack-user"
min = 1

# Global webhooks (all events, all environments)
[[webhooks]]
id = "dev-receiver"
url = "http://webhook-receiver:9999"
format = "generic"
events = ["request.created", "request.approved", "request.auto_approved", "request.rejected", "execution.completed", "execution.failed", "request.break_glass", "step.approved"]

# Execution policies (synced to SQLite on startup)

# Production: strict limits
[[execution_policies]]
database = "*"
environment = "production"
max_executions = 1
execution_window_secs = 3600
retry_on_failure = false
migration_statement_timeout_secs = 120
statement_timeout_secs = 30
max_statement_timeout_secs = 300

# Development: relaxed limits
[[execution_policies]]
database = "*"
environment = "development"
max_executions = 5
execution_window_secs = 86400
retry_on_failure = true
statement_timeout_secs = 60
max_statement_timeout_secs = 600
max_rows = 10000

# Result storage (local filesystem inside container)
[result_storage]
backend = "local"
root_dir = "/data/results"

[retention]
request_ttl_days = 7
audit_ttl_days = 30
result_ttl_days = 1
approval_ttl_secs = 600



# Catchall (*,*)
[[sql_review]]
database = "*"
environment = "*"
drop_table = "warn"
no_where_delete = "block"
no_where_update = "block"

# Env-specific (*,production)
[[sql_review]]
database = "*"
environment = "production"
drop_table = "block"
drop_column = "block"

# DB-specific (billing,*)
[[sql_review]]
database = "billing"
environment = "*"
truncate = "block"
alter_column_type = "block"

# Exact (billing,production)
[[sql_review]]
database = "billing"
environment = "production"
no_where_update = "off"

[[result_policies]]
database = "app"
environment = "production"
retention_days = 30
delivery_mode = "store_only"
access = ["requester"]

[[notification_policies]]
database = "app"
environment = "production"
webhooks = ["dev-receiver"]
events = ["execution.completed"]

[[users]]
id = "alice"
status = "active"

[[users]]
id = "bob"
status = "active"

# Slack integration (env vars set in .env or shell)
[slack]
bot_token = "${SLACK_BOT_TOKEN}"
signing_secret = "${SLACK_SIGNING_SECRET}"
channel = "C0123ABC456"
