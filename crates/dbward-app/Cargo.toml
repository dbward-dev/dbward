[package]
name = "dbward-app"
version = "0.1.0"
edition = "2021"
description = "Application layer for dbward — use cases and port traits"

[dependencies]
dbward-domain = { path = "../dbward-domain" }
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
