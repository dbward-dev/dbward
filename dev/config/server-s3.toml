state_dir = "/data"

# Trust Docker internal network for XFF resolution
trusted_proxies = ["172.16.0.0/12", "127.0.0.1"]

allow_private_networks = true

[auth]

# Database registry
[[databases]]
name = "app"
environments = ["development", "staging", "production"]

[[databases]]
name = "mysql_dev"
environments = ["development"]

# E2E test databases
[[databases]]
name = "default"
environments = ["development", "staging", "production"]

[[databases]]
name = "primary"
environments = ["development", "staging", "production"]

[[databases]]
name = "e2edb"
environments = ["development", "staging", "production"]

[[databases]]
name = "dupdb"
environments = ["development", "staging", "production", "prod"]

[[databases]]
name = "x"
environments = ["development", "staging", "production", "y"]

[[databases]]
name = "corrupt_db"
environments = ["production"]

[[databases]]
name = "corrupt_ops_db"
environments = ["production"]

# Workflow definitions (synced to SQLite on startup)

# Development: auto-approve everything
[[workflows]]
database = "*"
environment = "development"

[workflows.auto_approve]
mode = "always"

# Staging: team-lead OR dba (either one)
[[workflows]]
database = "*"
environment = "staging"

[[workflows.steps]]
type = "approval"
mode = "any"

[[workflows.steps.approvers]]
role = "team-lead"
min = 1

[[workflows.steps.approvers]]
role = "dba"
min = 1

# Production: 2-step approval (backend-team then dba-team, distinct actors)
[[workflows]]
database = "*"
environment = "production"
require_reason = true

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "backend-team"
min = 1

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "dba-team"
min = 1

# Global webhooks (all events, all environments)
[[webhooks]]
id = "dev-receiver"
url = "http://webhook-receiver:9999"
format = "generic"
events = ["request.created", "request.approved", "request.auto_approved", "request.rejected", "execution.completed", "execution.failed", "request.break_glass", "step.approved"]

# Result storage (local filesystem inside container)
[result_storage]
# S3 backend (MinIO)
backend = "s3"
bucket = "dbward-results"
region = "us-east-1"
endpoint = "http://minio:9000"
access_key_id = "minioadmin"
secret_access_key = "minioadmin"
path_style = true

[retention]
request_ttl_days = 7
audit_ttl_days = 30
result_ttl_days = 1
approval_ttl_secs = 60


