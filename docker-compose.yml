services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dbward
      POSTGRES_PASSWORD: dbward
      POSTGRES_DB: dbward_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbward"]
      interval: 2s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./dev/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 5s
      retries: 30

  dbward-server:
    build: .
    command: ["server", "start", "--data", "/data/dbward.db", "--listen", "0.0.0.0:3000", "--config", "/config/dbward-server.toml"]
    ports:
      - "3000:3000"
    volumes:
      - server-data:/data
      - ./dev/dbward-server.toml:/config/dbward-server.toml:ro
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "dbward server token create --user _healthcheck --role readonly --data /data/dbward.db 2>/dev/null || true && test -f /data/dbward.db"]
      interval: 3s
      timeout: 5s
      retries: 10

  # --- Dev setup: creates API tokens for alice and bob ---
  dev-init:
    build: .
    entrypoint: ["/bin/sh", "/scripts/dev-init.sh"]
    volumes:
      - server-data:/data
      - dev-tokens:/tokens
      - ./dev/dev-init.sh:/scripts/dev-init.sh:ro
    depends_on:
      dbward-server:
        condition: service_healthy

  # --- alice: developer (requester) ---
  alice:
    build: .
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "alice"]
    environment:
      DBWARD_DATABASE_URL: "postgres://dbward:dbward@postgres:5432/dbward_dev"
      DBWARD_SERVER_URL: "http://dbward-server:3000"
      DBWARD_PUBLIC_KEY: "/data/signing.pub"
    volumes:
      - server-data:/data:ro
      - dev-tokens:/tokens:ro
      - ./dev/dbward-cli.toml:/app/dbward.toml:ro
      - ./dev/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    working_dir: /app
    depends_on:
      dev-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    profiles:
      - dev

  # --- bob: admin (approver) ---
  bob:
    build: .
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "bob"]
    environment:
      DBWARD_DATABASE_URL: "postgres://dbward:dbward@postgres:5432/dbward_dev"
      DBWARD_SERVER_URL: "http://dbward-server:3000"
      DBWARD_PUBLIC_KEY: "/data/signing.pub"
    volumes:
      - server-data:/data:ro
      - dev-tokens:/tokens:ro
      - ./dev/dbward-cli.toml:/app/dbward.toml:ro
      - ./dev/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    working_dir: /app
    depends_on:
      dev-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    profiles:
      - dev

volumes:
  pgdata:
  server-data:
  dev-tokens:
