name: Feature Request
description: Suggest a feature for dbward
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI
        - Server
        - Agent
        - MCP
        - Documentation
        - Other
