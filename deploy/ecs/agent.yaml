AWSTemplateFormatVersion: "2010-09-09"
Description: "dbward Agent — stateless Fargate service connecting to dbward server"

Parameters:
  ClusterName:
    Type: String
    Description: ECS Cluster name (from server stack output)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for agent tasks

  ServerSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Server security group ID (for ingress rule)

  ImageRepository:
    Type: String
    Default: ghcr.io/dbward-dev/dbward-agent

  ImageTag:
    Type: String
    Default: latest

  AgentDesiredCount:
    Type: Number
    Default: 1

  AgentTokenSecretArn:
    Type: String
    Description: Secrets Manager ARN for agent token

  DatabaseUrlSecretArn:
    Type: String
    Description: Secrets Manager ARN for database URL

  AgentConfigToml:
    Type: String
    Default: |
      agent_id = "ecs-agent"
      poll_interval_ms = 1000
      max_concurrent_tasks = 4
      [server]
      url = "http://server:3000"
      agent_token = "${DBWARD_AGENT_TOKEN}"
      [databases.app.production]
      url = "${DATABASE_URL}"
    Description: "agent.toml content. server:3000 is resolved by Service Connect."

  DatabasePort:
    Type: Number
    Default: 5432
    Description: Database port (5432 for PostgreSQL, 3306 for MySQL)

  EcrRepositoryName:
    Type: String
    Default: ""
    Description: ECR repository name (leave empty if using public registry)

Conditions:
  UseEcr: !Not [!Equals [!Ref EcrRepositoryName, ""]]

Resources:
  # --- Log Group ---
  AgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ClusterName}/agent"
      RetentionInDays: 14

  # --- Security Group ---
  AgentSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: dbward agent
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          DestinationSecurityGroupId: !Ref ServerSecurityGroupId
        - IpProtocol: tcp
          FromPort: !Ref DatabasePort
          ToPort: !Ref DatabasePort
          CidrIp: "0.0.0.0/0"
          Description: Database egress
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: HTTPS (ECR pull, etc)
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: "0.0.0.0/0"
          Description: DNS (TCP)
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: "0.0.0.0/0"
          Description: DNS (UDP)

  ServerIngressFromAgent:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ServerSecurityGroupId
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref AgentSG

  # --- IAM ---
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-agent-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: execution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${AgentLogGroup.Arn}:*"
              - Sid: Secrets
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref AgentTokenSecretArn
                  - !Ref DatabaseUrlSecretArn

  EcrPolicy:
    Type: AWS::IAM::Policy
    Condition: UseEcr
    Properties:
      PolicyName: ecr-pull
      Roles: [!Ref ExecutionRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: ecr:GetAuthorizationToken
            Resource: "*"
          - Effect: Allow
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${EcrRepositoryName}"

  AgentTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ClusterName}-agent-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # --- Task Definition ---
  AgentTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ClusterName}-agent"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt AgentTaskRole.Arn
      ContainerDefinitions:
        - Name: agent
          Image: !Sub "${ImageRepository}:${ImageTag}"
          Essential: true
          EntryPoint: ["/bin/sh", "-c"]
          Command:
            - Fn::Sub:
                - |
                  cat > /tmp/agent.toml << 'TOMLEOF'
                  ${ConfigContent}
                  TOMLEOF
                  exec dbward-agent --config /tmp/agent.toml
                - ConfigContent: !Ref AgentConfigToml
          Secrets:
            - Name: DBWARD_AGENT_TOKEN
              ValueFrom: !Ref AgentTokenSecretArn
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecretArn
          Environment:
            - {Name: RUST_LOG, Value: info}
          HealthCheck:
            Command: ["CMD-SHELL", "test -f /tmp/dbward-agent-ready"]
            Interval: 10
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          StopTimeout: 90
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AgentLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: agent
          LinuxParameters:
            InitProcessEnabled: true

  # --- Service ---
  AgentService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref ClusterName
      ServiceName: agent
      TaskDefinition: !Ref AgentTaskDef
      DesiredCount: !Ref AgentDesiredCount
      LaunchType: FARGATE
      EnableExecuteCommand: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetIds
          SecurityGroups: [!Ref AgentSG]
          AssignPublicIp: ENABLED
      ServiceConnectConfiguration:
        Enabled: true

Outputs:
  AgentServiceName:
    Value: !GetAtt AgentService.Name
  AgentSecurityGroupId:
    Value: !Ref AgentSG
