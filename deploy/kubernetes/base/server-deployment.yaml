apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbward-server
  namespace: dbward
  labels:
    app.kubernetes.io/name: dbward-server
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dbward-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dbward-server
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: dbward-server
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: ghcr.io/dbward-dev/dbward-server:latest  # Pin to v0.1.x in production
          command: ["dbward-server"]
          args:
            - --listen
            - 0.0.0.0:3000
            - --config
            - /config/server.toml
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dbward-server-data
        - name: config
          configMap:
            name: dbward-server-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 30
