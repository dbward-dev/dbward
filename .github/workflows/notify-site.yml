name: Notify site on docs change
on:
  push:
    branches: [main]
    paths: ['docs/**']

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SITE_DISPATCH_TOKEN }}
          repository: dbward-dev/site
          event-type: docs-updated
          client-payload: '{"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"}'
