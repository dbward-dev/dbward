# Production deployment with Litestream (real-time SQLite replication to S3).
#
# Required .env variables:
#   DBWARD_AGENT_CONFIG=./agent.toml
#   DATABASE_URL=postgres://user:pass@host/db
#   DBWARD_AGENT_TOKEN=<generated by: dbward server token create --role agent>
#   LITESTREAM_S3_BUCKET=my-dbward-backups
#
# Optional:
#   LITESTREAM_S3_PATH=dbward/prod  (default: dbward)
#   AWS_REGION=ap-northeast-1
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY (or use IAM Role on EC2)
#   DBWARD_SERVER_CONFIG=./server.toml
#
# Security notes:
#   - Use chmod 600 on .env file
#   - On EC2, prefer IAM Roles over access keys in .env
#   - Put a reverse proxy (nginx/caddy) in front for TLS termination

services:
  dbward-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    entrypoint: ["docker-entrypoint.sh"]
    command: ["server", "start", "--data", "/data/dbward.db", "--config", "/config/server.toml"]
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - server-data:/data
      - ${DBWARD_SERVER_CONFIG:-./server.toml}:/config/server.toml:ro
    environment:
      - LITESTREAM_S3_BUCKET=${LITESTREAM_S3_BUCKET}
      - LITESTREAM_S3_PATH=${LITESTREAM_S3_PATH:-dbward/prod}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 150s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dbward-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command:
      - agent
      - start
      - --config
      - /config/agent.toml
    volumes:
      - ${DBWARD_AGENT_CONFIG:-./agent.toml}:/config/agent.toml:ro
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DBWARD_AGENT_TOKEN=${DBWARD_AGENT_TOKEN}
    restart: unless-stopped
    depends_on:
      dbward-server:
        condition: service_healthy
    stop_grace_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  server-data:
