# Production deployment template.
# Copy this file and create a .env with your secrets.
#
# Required .env variables:
#   DBWARD_SERVER_CONFIG=./server.toml
#   DBWARD_AGENT_CONFIG=./agent.toml
#   DATABASE_URL=postgres://user:pass@host/db
#   DBWARD_AGENT_TOKEN=<generated by: dbward server token create --role agent>
#
# Optional (S3 backup):
#   BACKUP_S3_BUCKET=my-backups
#   BACKUP_S3_PREFIX=dbward/
#   AWS_REGION=ap-northeast-1
#
# Security notes:
#   - Use chmod 600 on .env file
#   - On EC2, prefer IAM Roles over AWS_ACCESS_KEY_ID in .env
#   - Put a reverse proxy (nginx/caddy) in front for TLS termination

services:
  dbward-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command:
      - server
      - start
      - --data
      - /data/dbward.db
      - --config
      - /config/server.toml
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - server-data:/data
      - ${DBWARD_SERVER_CONFIG:-./server.toml}:/config/server.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    stop_grace_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dbward-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command:
      - agent
      - start
      - --config
      - /config/agent.toml
    volumes:
      - ${DBWARD_AGENT_CONFIG:-./agent.toml}:/config/agent.toml:ro
    restart: unless-stopped
    depends_on:
      dbward-server:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DBWARD_AGENT_TOKEN=${DBWARD_AGENT_TOKEN}
    stop_grace_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: alpine:3.20
    entrypoint: /bin/sh
    command:
      - /scripts/start-backup-cron.sh
    volumes:
      - server-data:/data:ro
      - backup-data:/backups
      - ./deploy/scripts/backup.sh:/scripts/backup.sh:ro
      - ./deploy/scripts/start-backup-cron.sh:/scripts/start-backup-cron.sh:ro
    restart: unless-stopped
    environment:
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - BACKUP_S3_PREFIX=${BACKUP_S3_PREFIX:-dbward/}
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  server-data:
  backup-data:
