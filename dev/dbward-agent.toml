agent_id = "agent-dev"
poll_interval_ms = 1000
lease_duration_secs = 300
max_concurrent_tasks = 4

[server]
url = "http://dbward-server:3000"
agent_token = "__DBWARD_AGENT_TOKEN__"

[databases.app.development]
url = "postgres://${DB_USER:-dbward}:${DB_PASS:-dbward}@postgres:5432/dbward_dev"
migrations_dir = "/workspace/db/migrations/app"
