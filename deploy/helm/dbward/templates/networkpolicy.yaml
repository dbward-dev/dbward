{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dbward.fullname" . }}-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: dbward
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dbward.fullname" . }}-allow-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: dbward
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dbward.fullname" . }}-server-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dbward.fullname" . }}-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "dbward.fullname" . }}-agent
      ports:
        - port: {{ .Values.server.port }}
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ .Values.server.port }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dbward.fullname" . }}-server-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dbward.fullname" . }}-server
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "dbward.fullname" . }}-agent-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dbward.fullname" . }}-agent
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "dbward.fullname" . }}-server
      ports:
        - port: {{ .Values.server.port }}
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 3306
{{- end }}
