services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dbward
      POSTGRES_PASSWORD: dbward
      POSTGRES_DB: dbward_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbward"]
      interval: 2s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./dev/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 5s
      retries: 30

  dbward-server:
    build: .
    command: ["server", "start", "--data", "/data/dbward.db", "--listen", "0.0.0.0:3000", "--config", "/config/dbward-server.toml"]
    ports:
      - "3000:3000"
    volumes:
      - server-data:/data
      - ./dev/dbward-server.toml:/config/dbward-server.toml:ro
    depends_on:
      keycloak:
        condition: service_healthy

  dbward:
    build: .
    entrypoint: ["dbward"]
    environment:
      DBWARD_DATABASE_URL: "postgres://dbward:dbward@postgres:5432/dbward_dev"
      DBWARD_SERVER_URL: "http://dbward-server:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - server-data:/data:ro
      - ./dev/dbward-cli.toml:/app/dbward.toml:ro
      - dbward-creds:/root/.dbward
    working_dir: /app
    profiles:
      - cli

volumes:
  pgdata:
  server-data:
  dbward-creds:
