state_dir = "/data"
allow_private_networks = true
[auth]

[auth.oidc]
issuer = "http://localhost:8080/realms/dbward"
client_id = "dbward-cli"
default_role = "approver"
jwks_uri = "http://keycloak:8080/realms/dbward/protocol/openid-connect/certs"

[[auth.oidc.role_mappings]]
claim = "groups"
value = "dbward-admins"
role = "admin"

[[auth.oidc.role_mappings]]
claim = "groups"
value = "dbward-developers"
role = "requester"

# Workflow definitions (synced to SQLite on startup)

# Development: auto-approve everything
[[workflows]]
database = "*"
environment = "development"

[workflows.auto_approve]
mode = "always"

# Staging: team-lead OR dba (either one)
[[workflows]]
database = "*"
environment = "staging"

[[workflows.steps]]
type = "approval"
mode = "any"

[[workflows.steps.approvers]]
role = "team-lead"
min = 1

[[workflows.steps.approvers]]
role = "dba"
min = 1

# Production: backend-team first, then dba-team (sequential, group-based)
[[workflows]]
database = "*"
environment = "production"
require_reason = true

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "backend-team"
min = 1

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "dba-team"
min = 1

# Global webhooks (all events, all environments)
[[webhooks]]
id = "dev-receiver"
url = "http://webhook-receiver:9999"
format = "generic"
events = ["request_created", "request_approved", "request_rejected", "request_completed", "break_glass", "step_approved"]

# Result storage (local filesystem inside container)
[result_storage]
backend = "local"
root_dir = "/data/results"
