apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbward-agent
  namespace: dbward
  labels:
    app.kubernetes.io/name: dbward-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dbward-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dbward-agent
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: dbward-agent
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: ghcr.io/dbward-dev/dbward-agent:latest  # Pin to v0.1.x in production
          command: ["dbward-agent"]
          args:
            - --config
            - /config/agent.toml
          env:
            - name: DBWARD_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: dbward-secrets
                  key: agent-token
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dbward-secrets
                  key: database-url
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 250m
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/dbward-agent-alive"]
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/dbward-agent-ready"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["test", "-f", "/tmp/dbward-agent-ready"]
            periodSeconds: 5
            failureThreshold: 60
      volumes:
        - name: config
          configMap:
            name: dbward-agent-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 90
