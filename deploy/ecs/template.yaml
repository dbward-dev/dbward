AWSTemplateFormatVersion: "2010-09-09"
Description: "dbward Server — Fargate with EFS + Service Connect"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for Fargate tasks (private recommended)
  AllowedIngressCidr:
    Type: String
    Default: "10.0.0.0/8"
    Description: CIDR allowed to access server port 3000

  ImageRepository:
    Type: String
    Default: ghcr.io/dbward-dev/dbward-server
  ImageTag:
    Type: String
    Default: latest
    Description: Change this and update-stack to upgrade

  ServerConfigToml:
    Type: String
    Default: |
      [auth]
      mode = "token"
      [[databases]]
      name = "app"
      environments = ["production"]
      [result_storage]
      backend = "local"
      root_dir = "/data/results"
    Description: "server.toml content. result_storage section is normalized by ResultStorageBackend at runtime."

  EnableAlb:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

  ResultStorageBackend:
    Type: String
    Default: "local"
    AllowedValues: ["local", "s3"]
    Description: Result storage backend. Use "s3" with a bucket from storage.yaml.

  ResultBucketName:
    Type: String
    Default: ""
    Description: S3 bucket name for result storage (from storage.yaml output). Required when ResultStorageBackend=s3.

  AlbSubnetIds:
    Type: CommaDelimitedList
    Default: ""
    Description: Public subnets for ALB (if EnableAlb=true)

  EcrRepositoryName:
    Type: String
    Default: ""
    Description: ECR repository name (leave empty if using public registry)

Rules:
  S3RequiresBucketName:
    RuleCondition: !Equals [!Ref ResultStorageBackend, "s3"]
    Assertions:
      - Assert: !Not [!Equals [!Ref ResultBucketName, ""]]
        AssertDescription: ResultBucketName is required when ResultStorageBackend=s3

Conditions:
  CreateAlb: !Equals [!Ref EnableAlb, "true"]
  UseEcr: !Not [!Equals [!Ref EcrRepositoryName, ""]]
  UseS3Storage: !Equals [!Ref ResultStorageBackend, "s3"]

Resources:
  # --- Cluster with Service Connect namespace ---
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}"
      ServiceConnectDefaults:
        Namespace: !GetAtt HttpNamespace.Arn

  HttpNamespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: !Sub "${AWS::StackName}"

  # --- EFS for SQLite persistence ---
  DataFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: elastic

  DataAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref DataFileSystem
      RootDirectory:
        Path: /dbward
        CreationInfo:
          OwnerUid: "10001"
          OwnerGid: "10001"
          Permissions: "0750"
      PosixUser:
        Uid: "10001"
        Gid: "10001"

  DataMountTarget0:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref DataFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups: [!Ref EfsSG]

  EfsSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: dbward EFS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ServerSG

  # --- Log Group ---
  ServerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}/server"
      RetentionInDays: 14

  # --- Security Group ---
  ServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: dbward server
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref AllowedIngressCidr
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: HTTPS (ECR, CloudWatch, S3)
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: "0.0.0.0/0"
          Description: NFS (EFS)
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: "0.0.0.0/0"
          Description: DNS (TCP)
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: "0.0.0.0/0"
          Description: DNS (UDP)

  # --- IAM ---
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: execution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: Logs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "${ServerLogGroup.Arn}:*"

  EcrPolicy:
    Type: AWS::IAM::Policy
    Condition: UseEcr
    Properties:
      PolicyName: ecr-pull
      Roles: [!Ref ExecutionRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: ecr:GetAuthorizationToken
            Resource: "*"
          - Effect: Allow
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${EcrRepositoryName}"

  ServerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-server-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ecs-exec
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"
        - PolicyName: efs-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                Resource: !GetAtt DataFileSystem.Arn
                Condition:
                  StringEquals:
                    elasticfilesystem:AccessPointArn: !GetAtt DataAccessPoint.Arn

  ServerS3Policy:
    Type: AWS::IAM::Policy
    Condition: UseS3Storage
    Properties:
      PolicyName: s3-result-storage
      Roles: [!Ref ServerTaskRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ResultObjects
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
              - s3:PutObjectTagging
            Resource: !Sub "arn:aws:s3:::${ResultBucketName}/results/*"
          - Sid: ListBucket
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !Sub "arn:aws:s3:::${ResultBucketName}"
            Condition:
              StringLike:
                s3:prefix: "results/*"

  # --- Server Task Definition ---
  ServerTaskDef:
    Type: AWS::ECS::TaskDefinition
    DependsOn: DataMountTarget0
    Properties:
      Family: !Sub "${AWS::StackName}-server"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt ServerTaskRole.Arn
      Volumes:
        - Name: data
          EFSVolumeConfiguration:
            FilesystemId: !Ref DataFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref DataAccessPoint
              IAM: ENABLED
      ContainerDefinitions:
        - Name: server
          Image: !Sub "${ImageRepository}:${ImageTag}"
          Essential: true
          EntryPoint: ["/bin/sh", "-c"]
          Command:
            - Fn::Sub:
                - |
                  cat > /tmp/server.toml.raw << 'TOMLEOF'
                  ${ConfigContent}
                  TOMLEOF
                  awk '
                    BEGIN { skip = 0 }
                    /^\[result_storage\]$/ { skip = 1; next }
                    /^\[/ && skip == 1 { skip = 0 }
                    skip == 0 { print }
                  ' /tmp/server.toml.raw > /tmp/server.toml
                  cat >> /tmp/server.toml << 'TOMLEOF'
                  ${ResultStorageConfig}
                  TOMLEOF
                  exec dbward-server --data /data/dbward.db --listen 0.0.0.0:3000 --config /tmp/server.toml
                - ConfigContent: !Ref ServerConfigToml
                  ResultStorageConfig: !If
                    - UseS3Storage
                    - !Sub |
                        [result_storage]
                        backend = "s3"
                        bucket = "${ResultBucketName}"
                        region = "${AWS::Region}"
                    - |
                        [result_storage]
                        backend = "local"
                        root_dir = "/data/results"
          PortMappings:
            - ContainerPort: 3000
              Name: http
              AppProtocol: http
          MountPoints:
            - SourceVolume: data
              ContainerPath: /data
          Environment:
            - {Name: RUST_LOG, Value: info}
            - {Name: AWS_EC2_METADATA_DISABLED, Value: "true"}
          HealthCheck:
            Command: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
            Interval: 10
            Timeout: 5
            Retries: 3
            StartPeriod: 15
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ServerLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: server
          LinuxParameters:
            InitProcessEnabled: true

  # --- Server Service ---
  ServerService:
    Type: AWS::ECS::Service
    Properties:
      Cluster: !Ref Cluster
      ServiceName: server
      TaskDefinition: !Ref ServerTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      EnableExecuteCommand: true
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Select [0, !Ref SubnetIds]
          SecurityGroups: [!Ref ServerSG]
          AssignPublicIp: ENABLED
      ServiceConnectConfiguration:
        Enabled: true
        Services:
          - PortName: http
            ClientAliases:
              - Port: 3000
                DnsName: server
      LoadBalancers: !If
        - CreateAlb
        - - ContainerName: server
            ContainerPort: 3000
            TargetGroupArn: !Ref AlbTargetGroup
        - !Ref "AWS::NoValue"

  # --- Optional ALB ---
  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateAlb
    Properties:
      GroupDescription: dbward ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedIngressCidr

  AlbToServerIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: CreateAlb
    Properties:
      GroupId: !Ref ServerSG
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref AlbSG

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: CreateAlb
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Scheme: internet-facing
      Subnets: !Ref AlbSubnetIds
      SecurityGroups: [!Ref AlbSG]

  AlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: CreateAlb
    Properties:
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /ready

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: CreateAlb
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroup

Outputs:
  ClusterName:
    Value: !Ref Cluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ServerSecurityGroupId:
    Value: !Ref ServerSG
    Export:
      Name: !Sub "${AWS::StackName}-ServerSG"

  ServerEndpoint:
    Value: !If
      - CreateAlb
      - !Sub "http://${Alb.DNSName}"
      - "http://server:3000 (Service Connect — accessible from tasks in this cluster)"

  FileSystemId:
    Value: !Ref DataFileSystem

  UpgradeCommand:
    Value: !Sub |
      aws cloudformation deploy --stack-name ${AWS::StackName} --template-file template.yaml --parameter-overrides ImageTag=NEW_TAG --capabilities CAPABILITY_NAMED_IAM

  BootstrapCommand:
    Description: Create initial tokens after first deploy
    Value: !Sub |
      TASK=$(aws ecs list-tasks --cluster ${AWS::StackName} --service-name server --query "taskArns[0]" --output text)
      aws ecs execute-command --cluster ${AWS::StackName} --task $TASK --container server --interactive --command "dbward-server --data /data/dbward.db token create --user admin --role admin"
