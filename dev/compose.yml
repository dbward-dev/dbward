x-security: &security
  read_only: true
  cap_drop: ["ALL"]
  security_opt: ["no-new-privileges:true"]
  tmpfs:
    - /tmp:size=64M

x-dbward-build: &dbward-build
  context: ..
  dockerfile: deploy/docker/Dockerfile
  target: runtime

networks:
  backend:
    internal: true
  db:
    internal: true
  frontend:

services:
  postgres:
    image: postgres:17
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp:size=64M
      - /run/postgresql:size=16M
    networks: [backend, db]
    environment:
      POSTGRES_USER: dbward
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: dbward_dev
    secrets: [db_password]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbward -d dbward_dev"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  dbward-server:
    build: *dbward-build
    <<: *security
    entrypoint: ["dbward-server"]
    command:
      - --listen
      - 0.0.0.0:3000
      - --config
      - /config/dbward-server.toml
      - --license-file
      - /secrets/license.key
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [backend, frontend]
    volumes:
      - server-data:/data
      - ./config/${DBWARD_SERVER_CONFIG:-server.toml}:/config/dbward-server.toml:ro
      - ./secrets/license.key:/secrets/license.key:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/health >/dev/null"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  dbward-agent:
    build: *dbward-build
    <<: *security
    entrypoint: ["/bin/sh", "/config/agent-entrypoint.sh"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [backend, db]
    volumes:
      - ../db/migrations:/workspace/db/migrations:ro
      - ./config/agent.toml:/config/dbward-agent.toml:ro
      - ./scripts/agent-entrypoint.sh:/config/agent-entrypoint.sh:ro
      - server-data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/dbward-agent-ready"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
    stop_grace_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      dbward-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  mock-license:
    image: python:3.12-slim
    profiles: [license-e2e]
    networks: [backend, frontend]
    volumes:
      - ./fixtures/mock-license-server.py:/app/server.py:ro
    command: ["python3", "/app/server.py"]
    ports:
      - "127.0.0.1:18443:8443"
      - "127.0.0.1:18444:8444"
    environment:
      MOCK_LICENSE_STATUS: active
      MOCK_GRACE_DAYS: "7"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8444/get-status')\""]
      start_period: 3s
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

  mysql:
    image: mysql:8.0
    profiles: [mysql]
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE", "SYS_NICE"]
    security_opt: ["no-new-privileges:true"]
    networks: [backend]
    environment:
      MYSQL_ROOT_PASSWORD: dbward
      MYSQL_USER: dbward
      MYSQL_PASSWORD: dbward
      MYSQL_DATABASE: dbward_dev
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdbward"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  dbward-agent-mysql:
    build: *dbward-build
    profiles: [mysql]
    <<: *security
    entrypoint: ["/bin/sh", "/config/agent-entrypoint.sh"]
    networks: [backend]
    volumes:
      - ./config/agent-mysql.toml:/config/dbward-agent.toml:ro
      - ./scripts/agent-entrypoint.sh:/config/agent-entrypoint.sh:ro
      - server-data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/dbward-agent-ready"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
    stop_grace_period: 90s
    depends_on:
      mysql:
        condition: service_healthy
      dbward-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  server-data:
  mysqldata:

secrets:
  db_password:
    file: ./secrets/db_password.txt
