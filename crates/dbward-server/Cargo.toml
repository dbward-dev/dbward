[package]
name = "dbward-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Approval workflow HTTP server with Ed25519 signed execution tokens"
keywords = ["database", "approval", "workflow", "audit"]
categories = ["database", "web-programming::http-server"]

[dependencies]
dbward-core = { path = "../dbward-core", version = "0.1.0" }
axum = "0.8"
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
rusqlite = { version = "0.35", features = ["bundled"] }
sha2 = "0.10"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
hex = "0.4"
tower-http = { version = "0.6", features = ["cors"] }
reqwest = { version = "0.12", features = ["json"] }
url = "2"
hmac = "0.12"
toml.workspace = true
jsonwebtoken = "9"
base64 = "0.22"
object_store = { version = "0.11", features = ["aws"] }
async-trait = "0.1"
casbin = { version = "2.20", default-features = false, features = ["runtime-tokio"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
hyper = "1"
http-body-util = "0.1"
tempfile = "3"
