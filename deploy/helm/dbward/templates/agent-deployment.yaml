{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dbward.fullname" . }}-agent
  labels:
    app.kubernetes.io/name: {{ include "dbward.fullname" . }}-agent
    app.kubernetes.io/component: agent
    {{- include "dbward.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dbward.fullname" . }}-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "dbward.fullname" . }}-agent
        app.kubernetes.io/component: agent
        app.kubernetes.io/part-of: dbward
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "dbward.fullname" . }}-agent
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: {{ include "dbward.agentImage" . }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - --config
            - /config/agent.toml
          env:
            - name: DBWARD_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "dbward.fullname" . }}-secrets
                  key: agent-token
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "dbward.fullname" . }}-secrets
                  key: database-url
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["test", "-f", "/tmp/dbward-agent-alive"]
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/dbward-agent-ready"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            exec:
              command: ["test", "-f", "/tmp/dbward-agent-ready"]
            periodSeconds: 5
            failureThreshold: 60
      volumes:
        - name: config
          configMap:
            name: {{ include "dbward.fullname" . }}-agent-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: {{ .Values.agent.terminationGracePeriodSeconds }}
{{- end }}
