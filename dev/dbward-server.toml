[auth]
mode = "both"

[auth.oidc]
issuer = "http://localhost:8080/realms/dbward"
client_id = "dbward-cli"
default_role = "readonly"
jwks_uri = "http://keycloak:8080/realms/dbward/protocol/openid-connect/certs"

[[auth.oidc.role_mappings]]
claim = "groups"
value = "dbward-admins"
role = "admin"

[[auth.oidc.role_mappings]]
claim = "groups"
value = "dbward-developers"
role = "developer"

# Workflow definitions (synced to SQLite on startup)

# Development: auto-approve everything
[[workflows]]
database = "*"
environment = "development"
steps = []

# Staging: team-lead OR dba (either one)
[[workflows]]
database = "*"
environment = "staging"

[[workflows.steps]]
type = "approval"
mode = "any"

[[workflows.steps.approvers]]
role = "team-lead"
min = 1

[[workflows.steps.approvers]]
role = "dba"
min = 1

# Production: team-lead first, then dba (sequential)
[[workflows]]
database = "*"
environment = "production"

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
role = "team-lead"
min = 1

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
role = "dba"
min = 1
