# cargo-deny configuration for dbward
# Run: cargo deny check

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # astral-tokio-tar: dev-dependency only (testcontainers)
    "RUSTSEC-2026-0066",
    "RUSTSEC-2026-0112",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
