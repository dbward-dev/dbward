
# Trust Docker internal network for XFF resolution
trusted_proxies = ["172.16.0.0/12", "127.0.0.1"]

[auth]
mode = "token"

# Database registry
[[databases]]
name = "app"
environments = ["development", "staging", "production"]

[[databases]]
name = "mysql_dev"
environments = ["development"]

# E2E test databases
[[databases]]
name = "default"
environments = ["development", "staging", "production"]

[[databases]]
name = "primary"
environments = ["development", "staging", "production"]

[[databases]]
name = "e2edb"
environments = ["development", "staging", "production"]

[[databases]]
name = "dupdb"
environments = ["development", "staging", "production", "prod"]

[[databases]]
name = "x"
environments = ["development", "staging", "production", "y"]

[[databases]]
name = "corrupt_db"
environments = ["production"]

[[databases]]
name = "corrupt_ops_db"
environments = ["production"]

# Workflow definitions (synced to SQLite on startup)

# Development: auto-approve everything
[[workflows]]
database = "*"
environment = "development"
explain = false
steps = []

# Staging: team-lead OR dba (either one)
[[workflows]]
database = "*"
environment = "staging"

[[workflows.steps]]
type = "approval"
mode = "any"

[[workflows.steps.approvers]]
role = "team-lead"
min = 1

[[workflows.steps.approvers]]
role = "dba"
min = 1

# Production: 2-step approval (backend-team then dba-team, distinct actors)
[[workflows]]
database = "*"
environment = "production"
require_reason = true

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "backend-team"
min = 1

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "dba-team"
min = 1

# Global webhooks (all events, all environments)
[[webhooks]]
url = "http://webhook-receiver:9999"
format = "generic"
events = ["request_created", "request_approved", "request_auto_approved", "request_rejected", "request_completed", "request_failed", "break_glass", "step_approved"]

# Result storage (local filesystem inside container)
[result_storage]
backend = "local"
root_dir = "/data/results"

[retention]
request_ttl_days = 7
audit_ttl_days = 30
result_ttl_days = 1
approval_ttl_secs = 60



[sql_review]
no_where_delete = "block"
no_where_update = "block"

# Auto-approve configuration (scoped by database/environment)
# Priority: (db, env) > (*, env) > (db, *) > (*, *)

# Global default: auto-approve Low risk
[[auto_approve]]
database = "*"
environment = "*"
risk = "low"
allow_read_only = true
allow_safe_ddl = true
max_estimated_rows = 1000

# Staging: auto-approve up to Medium
[[auto_approve]]
database = "*"
environment = "staging"
risk = "medium"

# Development: auto-approve up to High (nearly everything)
[[auto_approve]]
database = "*"
environment = "development"
risk = "high"

# Production: no auto-approve (explicit human approval required)
[[auto_approve]]
database = "*"
environment = "production"
risk = "none"
