# Dev overrides — automatically merged with compose.yml by `docker compose up`
# After first `docker compose up`, run `./dev/init-tokens.sh` to create dev tokens.
services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks: [backend, frontend]

  dbward-server:
    ports:
      - "127.0.0.1:${SERVER_PORT:-13000}:3000"
    environment:
      DBWARD_LICENSE_KEY: "${DBWARD_LICENSE_KEY:-}"
      DBWARD_LICENSE_PUBLIC_KEY: "${DBWARD_LICENSE_PUBLIC_KEY:-}"
      DBWARD_LICENSE_URL: "${DBWARD_LICENSE_URL:-}"
      DBWARD_LICENSE_INSECURE: "${DBWARD_LICENSE_INSECURE:-}"

  webhook-receiver:
    image: python:3.12-slim
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    command: ["python3", "/app/webhook-receiver.py"]
    networks: [backend]
    volumes:
      - ./fixtures/webhook-receiver.py:/app/webhook-receiver.py:ro
    ports:
      - "127.0.0.1:${WEBHOOK_PORT:-9999}:9999"
    tmpfs:
      - /tmp:size=16M

  alice:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: runtime
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "alice"]
    command: ["list"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    networks: [frontend]
    volumes:
      - ../db/migrations:/workspace/db/migrations:ro
      - ./tokens:/tokens:ro
      - ./config/cli.toml:/config/dbward-cli.toml:ro
      - ./scripts/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    tmpfs:
      - /tmp:size=16M
    profiles: [dev]

  bob:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: runtime
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "bob"]
    command: ["list"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    networks: [frontend]
    volumes:
      - ../db/migrations:/workspace/db/migrations:ro
      - ./tokens:/tokens:ro
      - ./config/cli.toml:/config/dbward-cli.toml:ro
      - ./scripts/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    tmpfs:
      - /tmp:size=16M
    profiles: [dev]

  # === S3 Profile (MinIO) ===
  # Usage: docker compose --profile s3 up -d
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    networks: [backend]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [s3]

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/dbward-results
    networks: [backend]
    profiles: [s3]

  # === OIDC Profile ===
  # Usage: ./dev/up-oidc.sh [-d]
  # Keycloak: http://localhost:8080 (admin/admin)
  # Users: alice/alice (developer, backend-team), bob/bob (admin, backend-team), carol/carol (dba-team)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./fixtures/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"
    networks: [backend, frontend]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    profiles: [oidc]

  alice-oidc:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: runtime
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    entrypoint: ["dbward"]
    command: ["whoami"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    networks: [frontend]
    environment:
      DBWARD_CONFIG: /config/dbward-cli.toml
    volumes:
      - ../db/migrations:/workspace/db/migrations:ro
      - ./config/cli-oidc.toml:/config/dbward-cli.toml:ro
      - alice-credentials:/data/.config/dbward
    tmpfs:
      - /tmp:size=16M
    profiles: [oidc]

  bob-oidc:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: runtime
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    entrypoint: ["dbward"]
    command: ["whoami"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    networks: [frontend]
    environment:
      DBWARD_CONFIG: /config/dbward-cli.toml
    volumes:
      - ../db/migrations:/workspace/db/migrations:ro
      - ./config/cli-oidc.toml:/config/dbward-cli.toml:ro
      - bob-credentials:/data/.config/dbward
    tmpfs:
      - /tmp:size=16M
    profiles: [oidc]

networks:
  backend:
    internal: true
  frontend:

volumes:
  alice-credentials:
  bob-credentials:

