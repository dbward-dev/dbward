state_dir = "/data"

# Trust Docker internal network for XFF resolution
trusted_proxies = ["172.16.0.0/12", "127.0.0.1"]

# Development: allow webhooks to private/internal hosts
allow_private_networks = true

[auth]
mode = "token"

# Database registry
[[databases]]
name = "app"
environments = ["development", "staging", "production"]

[[databases]]
name = "default"
environments = ["development", "staging", "production"]

[[databases]]
name = "mysql_dev"
environments = ["development"]

# Workflow definitions (synced to SQLite on startup)

# Development: auto-approve everything
[[workflows]]
database = "*"
environment = "development"
steps = []

# Staging: team-lead OR dba (either one)
[[workflows]]
database = "*"
environment = "staging"

[[workflows.steps]]
type = "approval"
mode = "any"

[[workflows.steps.approvers]]
role = "team-lead"
min = 1

[[workflows.steps.approvers]]
role = "dba"
min = 1

# Production: 2-step approval (backend-team then dba-team, distinct actors)
[[workflows]]
database = "*"
environment = "production"
require_reason = true

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "backend-team"
min = 1

[[workflows.steps]]
type = "approval"

[[workflows.steps.approvers]]
group = "dba-team"
min = 1

# Global webhooks (all events, all environments)
[[webhooks]]
id = "dev-receiver"
url = "http://webhook-receiver:9999"
format = "generic"
events = ["request_created", "request_approved", "request_auto_approved", "request_rejected", "request_completed", "request_failed", "break_glass", "step_approved"]

# Execution policies (synced to SQLite on startup)

# Production: strict limits
[[execution_policies]]
database = "*"
environment = "production"
max_executions = 1
execution_window_secs = 3600
retry_on_failure = false
migration_statement_timeout_secs = 120
statement_timeout_secs = 30
max_statement_timeout_secs = 300

# Development: relaxed limits
[[execution_policies]]
database = "*"
environment = "development"
max_executions = 5
execution_window_secs = 86400
retry_on_failure = true
statement_timeout_secs = 60
max_statement_timeout_secs = 600
max_rows = 10000

# Result storage (local filesystem inside container)
[result_storage]
backend = "local"
root_dir = "/data/results"

[retention]
request_ttl_days = 7
audit_ttl_days = 30
result_ttl_days = 1
approval_ttl_secs = 60



[sql_review]
no_where_delete = "block"
no_where_update = "block"

# Auto-approve configuration (scoped by database/environment)
# Priority: (db, env) > (*, env) > (db, *) > (*, *)

# Global default: auto-approve Low risk
[[auto_approve]]
database = "*"
environment = "*"
risk = "low"
allow_read_only = true
allow_safe_ddl = true
max_estimated_rows = 1000

# Staging: auto-approve up to Medium
[[auto_approve]]
database = "*"
environment = "staging"
risk = "low"

# Development: auto-approve up to High (nearly everything)
[[auto_approve]]
database = "*"
environment = "development"
risk = "high"

# Production: no auto-approve (explicit human approval required)
[[auto_approve]]
database = "*"
environment = "production"
risk = "none"

[[result_policies]]
database = "app"
environment = "production"
retention_days = 30
delivery_mode = "store_only"
access = ["requester"]

[[notification_policies]]
database = "app"
environment = "production"
webhooks = ["dev-receiver"]
events = ["request_completed"]

[[users]]
id = "config-alice"
status = "active"
