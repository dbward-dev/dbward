agent_id = "agent-dev"
poll_interval_ms = 1000
lease_duration_secs = 300
max_concurrent_tasks = 2

[server]
url = "http://dbward-server:3000"
agent_token = "__DBWARD_AGENT_TOKEN__"

[capabilities]
environments = ["development", "staging", "production"]
databases = ["app"]
operations = ["execute_query", "migrate_up", "migrate_down", "migrate_status"]

[databases.app]
url = "postgres://dbward:dbward@postgres:5432/dbward_dev"
migrations_dir = "/workspace/db/migrations/app"
