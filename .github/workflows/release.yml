name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            container: rust:1.88-bookworm
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            container: rust:1.88-bookworm
            suffix: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            container: ""
            suffix: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            container: ""
            suffix: darwin-arm64

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (non-container)
        if: matrix.container == ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools for aarch64-linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          apt-get update
          apt-get install -y gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p dbward -p dbward-server -p dbward-agent

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          for bin in dbward dbward-server dbward-agent; do
            SRC="target/${{ matrix.target }}/release/$bin"
            [ -f "$SRC" ] || continue
            cp "$SRC" "dist/${bin}-${{ matrix.suffix }}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: dist/amd64

      - uses: actions/download-artifact@v4
        with:
          name: binaries-linux-arm64
          path: dist/arm64

      - name: Extract binaries
        run: |
          mkdir -p binaries/amd64 binaries/arm64
          for bin in dbward dbward-server dbward-agent; do
            cp "dist/amd64/${bin}-linux-amd64" "binaries/amd64/${bin}"
            cp "dist/arm64/${bin}-linux-arm64" "binaries/arm64/${bin}"
            chmod +x "binaries/amd64/${bin}" "binaries/arm64/${bin}"
          done

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
