x-dbward-build: &dbward-build
  context: .
  dockerfile: Dockerfile
  target: runtime

services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dbward
      POSTGRES_PASSWORD: dbward
      POSTGRES_DB: dbward_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbward -d dbward_dev"]
      interval: 3s
      timeout: 5s
      retries: 20

  dbward-server:
    build: *dbward-build
    command:
      - server
      - start
      - --data
      - /data/dbward.db
      - --listen
      - 0.0.0.0:3000
      - --config
      - /config/dbward-server.toml
    ports:
      - "13000:3000"
    volumes:
      - server-data:/data
      - ./dev/dbward-server.toml:/config/dbward-server.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/health >/dev/null"]
      interval: 3s
      timeout: 5s
      retries: 20

  dbward-agent:
    build: *dbward-build
    entrypoint: ["/bin/sh", "/scripts/agent-entrypoint.sh"]
    volumes:
      - ./:/workspace
      - dev-tokens:/tokens:ro
      - ./dev/dbward-agent.toml:/config/dbward-agent.toml:ro
      - ./dev/agent-entrypoint.sh:/scripts/agent-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      dbward-server:
        condition: service_healthy
      dev-init:
        condition: service_completed_successfully

  dev-init:
    build: *dbward-build
    entrypoint: ["/bin/sh", "/scripts/dev-init.sh"]
    volumes:
      - server-data:/data
      - dev-tokens:/tokens
      - ./dev/dev-init.sh:/scripts/dev-init.sh:ro
    depends_on:
      dbward-server:
        condition: service_healthy

  alice:
    build: *dbward-build
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "alice"]
    command: ["list"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
      - dev-tokens:/tokens:ro
      - ./dev/dbward-cli.toml:/config/dbward-cli.toml:ro
      - ./dev/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    depends_on:
      dev-init:
        condition: service_completed_successfully
    profiles:
      - dev

  bob:
    build: *dbward-build
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "bob"]
    command: ["list"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
      - dev-tokens:/tokens:ro
      - ./dev/dbward-cli.toml:/config/dbward-cli.toml:ro
      - ./dev/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    depends_on:
      dev-init:
        condition: service_completed_successfully
    profiles:
      - dev

  carol:
    build: *dbward-build
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "carol"]
    command: ["list"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
      - dev-tokens:/tokens:ro
      - ./dev/dbward-cli.toml:/config/dbward-cli.toml:ro
      - ./dev/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    depends_on:
      dev-init:
        condition: service_completed_successfully
    profiles:
      - dev

  dave:
    build: *dbward-build
    entrypoint: ["/bin/sh", "/scripts/dev-entrypoint.sh", "dave"]
    command: ["list"]
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace
      - dev-tokens:/tokens:ro
      - ./dev/dbward-cli.toml:/config/dbward-cli.toml:ro
      - ./dev/dev-entrypoint.sh:/scripts/dev-entrypoint.sh:ro
    depends_on:
      dev-init:
        condition: service_completed_successfully
    profiles:
      - dev

  webhook-receiver:
    image: python:3.12-slim
    command: ["python3", "/app/webhook-receiver.py"]
    volumes:
      - ./dev/webhook-receiver.py:/app/webhook-receiver.py:ro
    ports:
      - "9999:9999"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./dev/keycloak-realm.json:/opt/keycloak/data/import/dbward-realm.json:ro
    profiles:
      - oidc

volumes:
  pgdata:
  server-data:
  dev-tokens:
