x-security: &security
  read_only: true
  cap_drop: ["ALL"]
  security_opt: ["no-new-privileges:true"]
  tmpfs:
    - /tmp:size=64M

x-dbward-build: &dbward-build
  context: .
  dockerfile: Dockerfile
  target: runtime

networks:
  backend:
    internal: true
  frontend:

services:
  postgres:
    image: postgres:17
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp:size=64M
      - /run/postgresql:size=16M
    networks: [backend]
    environment:
      POSTGRES_USER: dbward
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: dbward_dev
    secrets: [db_password]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbward -d dbward_dev"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  dbward-server:
    build: *dbward-build
    <<: *security
    entrypoint: ["dbward-server"]
    command:
      - --data
      - /data/dbward.db
      - --listen
      - 0.0.0.0:3000
      - --config
      - /config/dbward-server.toml
      - --dev-bootstrap
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [backend, frontend]
    volumes:
      - server-data:/data
      - ./dev/${DBWARD_SERVER_CONFIG:-dbward-server.toml}:/config/dbward-server.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/health >/dev/null"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  dbward-agent:
    build: *dbward-build
    <<: *security
    entrypoint: ["/bin/sh", "/config/agent-entrypoint.sh"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [backend]
    volumes:
      - ./db/migrations:/workspace/db/migrations:ro
      - ./dev/dbward-agent.toml:/config/dbward-agent.toml:ro
      - ./dev/agent-entrypoint.sh:/config/agent-entrypoint.sh:ro
      - server-data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/dbward-agent-ready"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
    stop_grace_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      dbward-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  mysql:
    image: mysql:8.0
    profiles: [mysql]
    cap_drop: ["ALL"]
    cap_add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE", "SYS_NICE"]
    security_opt: ["no-new-privileges:true"]
    networks: [backend]
    environment:
      MYSQL_ROOT_PASSWORD: dbward
      MYSQL_USER: dbward
      MYSQL_PASSWORD: dbward
      MYSQL_DATABASE: dbward_dev
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdbward"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  dbward-agent-mysql:
    build: *dbward-build
    profiles: [mysql]
    <<: *security
    entrypoint: ["dbward-agent"]
    command:
      - --config
      - /config/dbward-agent.toml
    networks: [backend]
    volumes:
      - ./dev/dbward-agent-mysql.toml:/config/dbward-agent.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/dbward-agent-ready"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
    stop_grace_period: 90s
    depends_on:
      mysql:
        condition: service_healthy
      dbward-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  server-data:
  mysqldata:

secrets:
  db_password:
    file: ./dev/secrets/db_password.txt
