# cargo-deny configuration for dbward
# Run: cargo deny check

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

exceptions = [
    { allow = ["LicenseRef-dbward-commercial"], crate = "dbward-commercial-license" },
    { allow = ["LicenseRef-dbward-commercial"], crate = "dbward-commercial-oidc" },
    { allow = ["LicenseRef-dbward-commercial"], crate = "dbward-commercial-group-auth" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # astral-tokio-tar: dev-dependency only (testcontainers)
    "RUSTSEC-2026-0066",
    "RUSTSEC-2026-0112",
    "RUSTSEC-2026-0145",
    # tar unpack_in symlink: dev-dependency only (testcontainers)
    "RUSTSEC-2026-0113",
    # rsa Marvin Attack: transitive via rustls (no RSA key exchange in our usage)
    "RUSTSEC-2023-0071",
    # rustls-pemfile unmaintained: transitive via reqwest/rustls
    "RUSTSEC-2025-0134",
    # quick-xml: transitive via object_store 0.11 (no XML parsing of untrusted input in our usage)
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
